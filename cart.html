<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSlipper — Your Cart</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --surface-color: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent-color: #000000;
            --border-color: #e5e7eb;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; padding: 0;
        }

        nav {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav h1 { margin: 0; font-size: 22px; text-transform: uppercase; font-weight: 800; letter-spacing: -0.5px; }
        
        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title { font-size: 24px; font-weight: 700; margin-bottom: 25px; }

        .cart-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-details h4 { margin: 0 0 4px 0; font-size: 16px; font-weight: 600; }
        .item-details p { margin: 0; font-size: 13px; color: var(--text-muted); }
        .item-price { font-weight: 700; font-size: 16px; }

        .cart-summary {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label { font-size: 18px; font-weight: 600; }
        .total-price { font-size: 22px; font-weight: 800; }

        .btn-container {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }

        button { 
            padding: 14px; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: 600; font-size: 15px; width: 100%;
        }

        .btn-checkout { background: var(--accent-color); color: white; }
        .btn-clear { background: transparent; color: #ef4444; border: 1px solid #ef4444; }
        
        .empty-message {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 16px;
        }
    </style>
</head>
<body>

    <nav>
        <h1>ShopSlipper</h1>
        <a href="index.html">← Back to Shop</a>
    </nav>
    
    <div class="container">
        <div class="section-title">Shopping Cart</div>
        
        <div class="cart-card">
            <!-- Dynamic Items Container -->
            <div id="cart-items-list"></div>
            
            <!-- Summary Row -->
            <div class="cart-summary">
                <div class="total-label">Total Amount:</div>
                <div class="total-price" id="cart-total-amount">Rs 0</div>
            </div>

            <!-- Action Buttons -->
            <div class="btn-container">
                <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
                <button class="btn-checkout" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </div>
    </div>
    
    <script>
        // Read cart data from memory
        let cart = JSON.parse(localStorage.getItem('shop_cart')) || [];
        const itemsContainer = document.getElementById('cart-items-list');
        const totalContainer = document.getElementById('cart-total-amount');

        function renderCart() {
            itemsContainer.innerHTML = '';
            
            if (cart.length === 0) {
                itemsContainer.innerHTML = '<div class="empty-message">Your cart is currently empty.</div>';
                totalContainer.textContent = 'Rs 0';
                return;
            }

            let total = 0;
            
            cart.forEach((item, index) => {
                total += item.price;
                
                const itemRow = document.createElement('div');
                itemRow.className = 'cart-item';
                itemRow.innerHTML = `
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p>Standard Size</p>
                    </div>
                    <div class="item-price">Rs ${item.price.toLocaleString()}</div>
                `;
                itemsContainer.appendChild(itemRow);
            });

            totalContainer.textContent = `Rs ${total.toLocaleString()}`;
        }

        function clearCart() {
            if(confirm("Are you sure you want to empty your cart?")) {
                cart = [];
                localStorage.setItem('shop_cart', JSON.stringify(cart));
                renderCart();
            }
        }

        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }
            alert("Order placed successfully! Thank you for shopping with ShopSlipper.");
            cart = [];
            localStorage.setItem('shop_cart', JSON.stringify(cart));
            window.location.href = 'index.html';
        }

        // Initialize display on load
        renderCart();
    </script>
</body>
</html>
