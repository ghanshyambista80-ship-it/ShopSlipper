<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — ShopSlipper</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --surface-color: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent-color: #000000;
            --border-color: #e5e7eb;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
        nav { background-color: var(--surface-color); border-bottom: 1px solid var(--border-color); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { margin: 0; font-size: 22px; text-transform: uppercase; font-weight: 800; }
        .back-btn { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 14px; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--surface-color); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}
        .cart-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .cart-total-box { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding-top: 15px; border-top: 2px solid var(--text-main); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; text-transform: uppercase;}
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font-size: 14px; background: #fafafa; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-color); background: #fff;}
        button.order-submit { background: var(--accent-color); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; width: 100%; margin-top: 15px; }
        .cod-badge { background: #f0fdf4; color: #166534; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; margin-bottom: 20px; display: inline-block; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>
    <nav>
        <h1>ShopSlipper</h1>
        <a href="index.html" class="back-btn">← Continue Shopping</a>
    </nav>
    <div class="container">
        <div class="card">
            <div class="section-title">Review Your Items</div>
            <ul id="cart-items" class="cart-list"></ul>
            <div class="cart-total-box">
                <h3>Total Amount</h3>
                <h3>Rs <span id="cart-total">0</span></h3>
            </div>
            <div style="margin-top: 40px;">
                <div class="section-title">Delivery Address</div>
                <span class="cod-badge">✓ Cash on Delivery (COD)</span>
                <div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" required></div>
                <div class="form-group"><label>Delivery Address</label><textarea id="address" rows="3" required></textarea></div>
                <button class="order-submit" id="order-btn" onclick="placeOrder()">Confirm & Place Order</button>
            </div>
        </div>
    </div>
    <script>
        // Updated with your new Apps Script link
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2K9CGHic5VtAsNmK7di26GaxG4-MtxMtkoJtYdoVvjefOf21umD8axhymLmw69g0m/exec'; 
        
        let cart = JSON.parse(localStorage.getItem('shop_cart')) || [];
        renderCart();

        function renderCart() {
            const cartList = document.getElementById('cart-items');
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            if (cart.length === 0) {
                cartList.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px 0;">Your cart is empty.</p>';
                document.getElementById('cart-total').textContent = "0";
                return;
            }
            cartList.innerHTML = '';
            cart.forEach((item) => {
                let li = document.createElement('li');
                li.className = 'cart-item';
                li.innerHTML = `<span>${item.name}</span><strong>Rs ${item.price.toLocaleString()}</strong>`;
                cartList.appendChild(li);
            });
            document.getElementById('cart-total').textContent = total.toLocaleString();
        }

        function placeOrder() {
            if (cart.length === 0) return;
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            if (!name || !phone || !address) { alert("Please complete all fields."); return; }

            const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);
            const orderId = 'SS' + Math.floor(100000 + Math.random() * 900000) + 'NP';

            const orderData = {
                orderId: orderId, name: name, phone: phone, address: address,
                orderDetails: cart.map(i => i.name).join(", "), totalAmount: totalAmount
            };

            const btn = document.getElementById('order-btn');
            btn.textContent = "Processing..."; btn.disabled = true;

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify(orderData), headers: { 'Content-Type': 'application/json' }
            }).then(() => {
                alert(`🎉 Order Placed!\nOrder ID: ${orderId}`);
                localStorage.removeItem('shop_cart');
                window.location.href = "index.html";
            }).catch(() => {
                alert("Something went wrong.");
                btn.textContent = "Confirm & Place Order"; btn.disabled = false;
            });
        }
    </script>
</body>
</html>
